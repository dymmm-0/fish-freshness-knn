<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Klasifikasi Kesegaran Ikan{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --laut: #0f766e;
            --laut-gelap: #115e59;
            --biru: #0ea5e9;
            --mint: #ccfbf1;
            --kuning: #facc15;
            --tinta: #0f172a;
            --muted: #64748b;
            --panel: rgba(255, 255, 255, .86);
            --border: rgba(15, 118, 110, .14);
        }

        body {
            min-height: 100vh;
            color: var(--tinta);
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, .22), transparent 34rem),
                radial-gradient(circle at 85% 10%, rgba(20, 184, 166, .2), transparent 28rem),
                linear-gradient(180deg, #f0fdfa 0%, #f8fafc 45%, #eef6ff 100%);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .navbar-blur {
            background: rgba(15, 118, 110, .92);
            backdrop-filter: blur(16px);
            box-shadow: 0 14px 35px rgba(15, 23, 42, .12);
        }

        .navbar-brand-mark {
            width: 2.4rem;
            height: 2.4rem;
            display: inline-grid;
            place-items: center;
            border-radius: 1rem;
            color: #042f2e;
            background: linear-gradient(135deg, #a7f3d0, #7dd3fc);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.75);
        }

        .nav-link {
            border-radius: 999px;
            padding-inline: 1rem !important;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #042f2e !important;
            background: rgba(255, 255, 255, .9);
        }

        .page-shell {
            padding-block: 2rem 3rem;
        }

        .hero-card,
        .app-card {
            border: 1px solid var(--border);
            border-radius: 1.6rem;
            background: var(--panel);
            box-shadow: 0 24px 70px rgba(15, 23, 42, .1);
            backdrop-filter: blur(18px);
        }

        .hero-card {
            overflow: hidden;
            position: relative;
        }

        .hero-card::after {
            content: "";
            position: absolute;
            inset: auto -6rem -7rem auto;
            width: 18rem;
            height: 18rem;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(20, 184, 166, .24), transparent 65%);
        }

        .section-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            color: var(--laut-gelap);
            background: rgba(204, 251, 241, .75);
            border: 1px solid rgba(20, 184, 166, .2);
            border-radius: 999px;
            padding: .35rem .75rem;
            font-size: .82rem;
            font-weight: 700;
            letter-spacing: .03em;
            text-transform: uppercase;
        }

        .metric-card {
            border: 0;
            border-radius: 1.35rem;
            background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.72));
            box-shadow: 0 18px 50px rgba(15, 23, 42, .08);
            transition: transform .18s ease, box-shadow .18s ease;
        }

        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 58px rgba(15, 23, 42, .12);
        }

        .metric-icon {
            width: 2.8rem;
            height: 2.8rem;
            display: inline-grid;
            place-items: center;
            border-radius: 1rem;
            color: white;
            background: linear-gradient(135deg, var(--laut), var(--biru));
        }

        .btn-brand {
            color: white;
            border: 0;
            background: linear-gradient(135deg, var(--laut), var(--biru));
            box-shadow: 0 14px 28px rgba(14, 165, 233, .25);
        }

        .btn-brand:hover {
            color: white;
            filter: brightness(.96);
            transform: translateY(-1px);
        }

        .soft-panel {
            border: 1px solid rgba(15, 118, 110, .12);
            border-radius: 1.25rem;
            background: rgba(248, 250, 252, .82);
        }

        .table-modern {
            --bs-table-bg: transparent;
            border-collapse: separate;
            border-spacing: 0 .7rem;
        }

        .table-modern thead th {
            color: var(--muted);
            border: 0;
            font-size: .78rem;
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        .table-modern tbody tr {
            box-shadow: 0 12px 35px rgba(15, 23, 42, .06);
        }

        .table-modern tbody td {
            border-block: 1px solid rgba(15, 118, 110, .1);
            background: rgba(255, 255, 255, .9);
            vertical-align: middle;
        }

        .table-modern tbody td:first-child {
            border-left: 1px solid rgba(15, 118, 110, .1);
            border-radius: 1rem 0 0 1rem;
        }

        .table-modern tbody td:last-child {
            border-right: 1px solid rgba(15, 118, 110, .1);
            border-radius: 0 1rem 1rem 0;
        }

        .canvas-frame,
        .video-frame {
            width: 100%;
            border: 1px dashed rgba(15, 118, 110, .28);
            border-radius: 1.1rem;
            background: linear-gradient(135deg, rgba(240, 253, 250, .95), rgba(239, 246, 255, .95));
        }

        .video-frame {
            min-height: 250px;
            object-fit: cover;
            background: #0f172a;
        }

        .feature-pill {
            border-radius: 999px;
            padding: .55rem .8rem;
            color: #0f172a;
            background: rgba(204, 251, 241, .7);
            border: 1px solid rgba(20, 184, 166, .18);
            font-weight: 700;
        }

        .footer-text {
            color: var(--muted);
            font-size: .9rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-blur sticky-top">
    <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="{{ url_for('dashboard') }}">
            <span class="navbar-brand-mark"><i class="bi bi-droplet-half"></i></span>
            <span>KNN Ikan Kembung</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarUtama" aria-controls="navbarUtama" aria-expanded="false" aria-label="Buka navigasi">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarUtama">
            <div class="navbar-nav ms-auto gap-lg-2 mt-3 mt-lg-0">
                <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                <a class="nav-link {% if request.endpoint == 'prediksi' %}active{% endif %}" href="{{ url_for('prediksi') }}"><i class="bi bi-camera me-1"></i>Prediksi</a>
                <a class="nav-link {% if request.endpoint == 'riwayat' %}active{% endif %}" href="{{ url_for('riwayat') }}"><i class="bi bi-clock-history me-1"></i>Riwayat</a>
            </div>
        </div>
    </div>
</nav>

<main class="container page-shell">
    {% block content %}{% endblock %}
</main>

<footer class="container pb-4 text-center footer-text">
    Sistem klasifikasi kesegaran ikan berbasis fitur warna RGB-HSV dan K-Nearest Neighbor.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
